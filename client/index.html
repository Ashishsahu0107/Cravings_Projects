<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./dist-check/assets/circleLogo-DpCri5UD.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('cravings-theme') || 'light';
          var allowedThemes = ['light', 'dark', 'corporate', 'gourmet', 'pastel', 'shadcn', 'slack', 'mintlify'];
          if (allowedThemes.indexOf(theme) === -1) theme = 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (error) {}
      })();
    </script>
    <title>Cravings</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
